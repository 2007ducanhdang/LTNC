name: Bai 4 - Matrix OS Testing

on:
  push:
    branches: [ "main", "master" ]

jobs:
  test-on-multiple-os:
    # 1. Khai báo chiến lược Matrix với 3 hệ điều hành
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    # 2. Thay vì fix cứng ubuntu, ta dùng biến matrix.os
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests on ${{ matrix.os }}
        working-directory: ./Bai_4
        run: mvn clean test